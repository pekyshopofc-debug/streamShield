version: '3.9'

services:
  streamshield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamshield
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/streamshield.db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - YTDLP_PATH=/usr/local/bin/yt-dlp
    volumes:
      - streamshield_data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  streamshield_data:
